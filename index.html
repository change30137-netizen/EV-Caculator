<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電壓降檢討自動化系統 - Terry CTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF 產生必備函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .input-card { @apply bg-white p-3 md:p-5 rounded-xl border border-gray-200 shadow-sm transition-all hover:shadow-md; }
        .label-text { @apply block text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-wider mb-1; }
        .input-field { @apply w-full bg-gray-50 border border-gray-300 rounded-lg px-2 py-1 md:px-3 md:py-2 text-base md:text-lg font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white; }
        .select-field { @apply w-full bg-blue-50 border border-blue-200 rounded-lg px-1 py-1 md:px-3 md:py-2 text-sm md:text-lg font-bold text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer; }
        .formula-display { @apply mt-3 p-2 md:p-3 bg-slate-100 rounded-lg border-l-4 border-slate-400 font-mono text-[11px] md:text-sm text-slate-700 break-words; }
        .status-badge { @apply px-2 py-0.5 rounded-full text-[10px] md:text-xs font-bold transition-all duration-300; }
        .pending { @apply bg-gray-100 text-gray-400; }
        .calculated { @apply bg-blue-100 text-blue-700; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <!-- 導航欄 -->
    <nav class="bg-slate-900 text-white p-3 md:p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg md:text-xl font-bold leading-tight">電壓降自動化檢討</h1>
                <p class="text-[9px] md:text-[10px] text-slate-400">Terry CTO 內部技術規範版本</p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadPDF()" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded text-xs md:text-sm font-medium transition">下載 PDF</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-3 md:p-8 space-y-4 md:space-y-8" id="report-container">
        
        <!-- 區間一 -->
        <div class="input-card border-l-[6px] md:border-l-8 border-l-blue-500">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm md:text-lg font-bold text-slate-800">1. [受電開關 → 錶前]</h2>
                <span id="badge1" class="status-badge pending">待計算</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-2 md:gap-4">
                <div>
                    <label class="label-text">電流 (A)</label>
                    <input type="number" id="s1_i" value="400" class="input-field" oninput="updatePreview()">
                </div>
                <div>
                    <label class="label-text">距離 (m)</label>
                    <input type="number" id="s1_l" value="15" class="input-field" oninput="updatePreview()">
                </div>
                <div>
                    <label class="label-text">XLPE (mm²)</label>
                    <select id="s1_xlpe" class="select-field" onchange="updatePreview()"></select>
                </div>
                <div>
                    <label class="label-text">數量 (條數)</label>
                    <input type="number" id="s1_qty" value="1" step="1" min="1" class="input-field bg-yellow-50" oninput="updatePreview()">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="label-text">電壓 (V)</label>
                    <select id="s1_v" class="select-field" onchange="updatePreview()">
                        <option value="110" selected>110V</option>
                        <option value="220">220V</option>
                        <option value="380">380V</option>
                    </select>
                </div>
            </div>
            <div id="s1_formula" class="formula-display italic">填入數值以預覽...</div>
        </div>

        <!-- 區間二 -->
        <div class="input-card border-l-[6px] md:border-l-8 border-l-emerald-500">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm md:text-lg font-bold text-slate-800">2. [錶前 → 錶後]</h2>
                <span id="badge2" class="status-badge pending">待計算</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-2 md:gap-4">
                <div>
                    <label class="label-text">電流 (A)</label>
                    <input type="number" id="s2_i" value="75" class="input-field" oninput="updatePreview()">
                </div>
                <div>
                    <label class="label-text">距離 (m)</label>
                    <input type="number" id="s2_l" value="5" class="input-field" oninput="updatePreview()">
                </div>
                <div>
                    <label class="label-text">XLPE (mm²)</label>
                    <select id="s2_xlpe" class="select-field" onchange="updatePreview()"></select>
                </div>
                <div>
                    <label class="label-text">數量 (條數)</label>
                    <input type="number" id="s2_qty" value="1" step="1" min="1" class="input-field bg-yellow-50" oninput="updatePreview()">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="label-text">電壓 (V)</label>
                    <select id="s2_v" class="select-field" onchange="updatePreview()">
                        <option value="110" selected>110V</option>
                        <option value="220">220V</option>
                        <option value="380">380V</option>
                    </select>
                </div>
            </div>
            <div id="s2_formula" class="formula-display italic">填入數值以預覽...</div>
        </div>

        <!-- 區間三 -->
        <div class="input-card border-l-[6px] md:border-l-8 border-l-orange-500">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm md:text-lg font-bold text-slate-800">3. [錶後 → CH1]</h2>
                <span id="badge3" class="status-badge pending">待計算</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-2 md:gap-4">
                <div>
                    <label class="label-text">電流 (A)</label>
                    <input type="number" id="s3_i" value="32" class="input-field" oninput="updatePreview()">
                </div>
                <div>
                    <label class="label-text">距離 (m)</label>
                    <input type="number" id="s3_l" value="45" class="input-field" oninput="updatePreview()">
                </div>
                <div>
                    <label class="label-text">XLPE (mm²)</label>
                    <select id="s3_xlpe" class="select-field" onchange="updatePreview()"></select>
                </div>
                <div>
                    <label class="label-text">數量 (條數)</label>
                    <input type="number" id="s3_qty" value="1" step="1" min="1" class="input-field bg-yellow-50" oninput="updatePreview()">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="label-text">電壓 (V)</label>
                    <select id="s3_v" class="select-field" onchange="updatePreview()">
                        <option value="110">110V</option>
                        <option value="220" selected>220V</option>
                        <option value="380">380V</option>
                    </select>
                </div>
            </div>
            <div id="s3_formula" class="formula-display italic">填入數值以預覽...</div>
        </div>

        <!-- 計算按鈕 -->
        <div class="py-2">
            <button onclick="calculateAll()" id="btn-calc" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-lg shadow-xl transition active:scale-95 flex items-center justify-center gap-2">
                <span>⚡</span> 執行檢討計算
            </button>
        </div>

        <!-- 總結結果 -->
        <div id="result-section" class="bg-slate-200 rounded-2xl p-5 md:p-8 text-slate-500 shadow-inner transition-all duration-500">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <h3 class="text-[10px] md:text-xs font-bold uppercase mb-1">錶後壓降 (1+2)</h3>
                    <div class="text-3xl md:text-4xl font-mono" id="sum_12">--- %</div>
                    <p class="text-[11px] mt-1" id="check_12">目標：< 2%</p>
                </div>
                <div>
                    <h3 class="text-[10px] md:text-xs font-bold uppercase mb-1">總壓降 (1+2+3)</h3>
                    <div class="text-3xl md:text-4xl font-mono text-blue-400" id="sum_all">--- %</div>
                    <p class="text-[11px] mt-1" id="check_all">目標：< 5%</p>
                </div>
            </div>
            <div id="verdict_box" class="p-3 md:p-4 rounded-xl text-center text-lg md:text-xl font-bold bg-white/50 border-2 border-dashed border-slate-300">
                請執行計算
            </div>
        </div>
    </main>

    <script>
        // --- XLPE 對照表 ---
        const xlpeTable = {
            "8": 2.45, "14": 1.41, "22": 0.824, "30": 0.623, "38": 0.487, 
            "50": 0.366, "60": 0.305, "80": 0.229, "100": 0.183, 
            "125": 0.146, "150": 0.122, "200": 0.0915, "250": 0.0739
        };

        function initSelects() {
            const sections = ['s1', 's2', 's3'];
            const defaultValues = ['250', '30', '14'];
            
            sections.forEach((sec, index) => {
                const el = document.getElementById(`${sec}_xlpe`);
                Object.keys(xlpeTable).forEach(size => {
                    const opt = document.createElement('option');
                    opt.value = size;
                    opt.text = `${size}sq`;
                    if (size === defaultValues[index]) opt.selected = true;
                    el.appendChild(opt);
                });
            });
        }

        const getVal = (id) => {
            const val = parseFloat(document.getElementById(id).value);
            return isNaN(val) ? 0 : val;
        };
        const getR = (id) => xlpeTable[document.getElementById(id).value] || 0;

        function updatePreview() {
            document.querySelectorAll('.status-badge').forEach(el => {
                el.innerText = '已變動';
                el.className = 'status-badge bg-yellow-100 text-yellow-700';
            });
            document.getElementById('result-section').className = "bg-slate-200 rounded-2xl p-5 text-slate-500 shadow-inner";
            document.getElementById('verdict_box').innerText = "數值已變動，請重新計算";

            // 區間 1
            const i1 = getVal('s1_i'), l1 = getVal('s1_l'), r1 = getR('s1_xlpe'), v1 = getVal('s1_v'), q1 = getVal('s1_qty');
            const rPart1 = q1 === 1 ? `${r1}` : `(${r1} x ${q1})`;
            document.getElementById('s1_formula').innerHTML = `預覽: ${i1} x ${l1} x ${rPart1} / 1000 / ${v1} = ? %`;
            
            // 區間 2
            const i2 = getVal('s2_i'), l2 = getVal('s2_l'), r2 = getR('s2_xlpe'), v2 = getVal('s2_v'), q2 = getVal('s2_qty');
            const rPart2 = q2 === 1 ? `${r2}` : `(${r2} x ${q2})`;
            document.getElementById('s2_formula').innerHTML = `預覽: ${i2} x ${l2} x ${rPart2} / 1000 / ${v2} = ? %`;

            // 區間 3 (單相二線預設 2 倍)
            const i3 = getVal('s3_i'), l3 = getVal('s3_l'), r3 = getR('s3_xlpe'), v3 = getVal('s3_v'), q3 = getVal('s3_qty');
            const rPart3 = q3 === 1 ? `${r3}` : `(${r3} x ${q3})`;
            document.getElementById('s3_formula').innerHTML = `預覽: 2 x ${i3} x ${l3} x ${rPart3} / 1000 / ${v3} = ? %`;
        }

        function calculateAll() {
            // 區間 1
            const i1 = getVal('s1_i'), l1 = getVal('s1_l'), r1 = getR('s1_xlpe'), v1 = getVal('s1_v'), q1 = getVal('s1_qty');
            const vd1 = (i1 * l1 * (r1 * q1)) / 1000 / v1 * 100;
            const rPart1 = q1 === 1 ? `${r1}` : `(${r1} x ${q1})`;
            document.getElementById('s1_formula').innerHTML = `VD% = ${i1} x ${l1} x ${rPart1} / 1000 / ${v1} = <strong>${vd1.toFixed(3)}%</strong>`;
            document.getElementById('badge1').innerText = 'OK';
            document.getElementById('badge1').className = 'status-badge bg-blue-100 text-blue-700';
            
            // 區間 2
            const i2 = getVal('s2_i'), l2 = getVal('s2_l'), r2 = getR('s2_xlpe'), v2 = getVal('s2_v'), q2 = getVal('s2_qty');
            const vd2 = (i2 * l2 * (r2 * q2)) / 1000 / v2 * 100;
            const rPart2 = q2 === 1 ? `${r2}` : `(${r2} x ${q2})`;
            document.getElementById('s2_formula').innerHTML = `VD% = ${i2} x ${l2} x ${rPart2} / 1000 / ${v2} = <strong>${vd2.toFixed(3)}%</strong>`;
            document.getElementById('badge2').innerText = 'OK';
            document.getElementById('badge2').className = 'status-badge bg-emerald-100 text-emerald-700';

            // 區間 3
            const i3 = getVal('s3_i'), l3 = getVal('s3_l'), r3 = getR('s3_xlpe'), v3 = getVal('s3_v'), q3 = getVal('s3_qty');
            const vd3 = (2 * i3 * l3 * (r3 * q3)) / 1000 / v3 * 100;
            const rPart3 = q3 === 1 ? `${r3}` : `(${r3} x ${q3})`;
            document.getElementById('s3_formula').innerHTML = `VD% = 2 x ${i3} x ${l3} x ${rPart3} / 1000 / ${v3} = <strong>${vd3.toFixed(3)}%</strong>`;
            document.getElementById('badge3').innerText = 'OK';
            document.getElementById('badge3').className = 'status-badge bg-orange-100 text-orange-700';

            const s12 = vd1 + vd2;
            const sall = vd1 + vd2 + vd3;

            const resultSection = document.getElementById('result-section');
            resultSection.className = "bg-slate-800 rounded-2xl p-5 md:p-8 text-white shadow-2xl transition-all duration-500";
            
            document.getElementById('sum_12').innerText = `${s12.toFixed(3)}%`;
            document.getElementById('sum_all').innerText = `${sall.toFixed(3)}%`;

            const vBox = document.getElementById('verdict_box');
            const is12Pass = s12 < 2;
            const isAllPass = sall < 5;

            document.getElementById('check_12').innerHTML = `目標：< 2% ${is12Pass ? '✅' : '❌'}`;
            document.getElementById('check_all').innerHTML = `目標：< 5% ${isAllPass ? '✅' : '❌'}`;

            if (is12Pass && isAllPass) {
                vBox.innerText = "⭐ 檢討合格";
                vBox.className = "p-3 rounded-xl text-center text-lg font-bold bg-emerald-500 text-white shadow-lg";
            } else {
                vBox.innerText = "⚠️ 不合格";
                vBox.className = "p-3 rounded-xl text-center text-lg font-bold bg-red-600 text-white shadow-lg";
            }
        }

        async function downloadPDF() {
            const container = document.getElementById('report-container');
            calculateAll();
            const canvas = await html2canvas(container, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`電壓降報告_${new Date().toLocaleDateString()}.pdf`);
        }

        window.onload = () => {
            initSelects();
            updatePreview();
        };
    </script>
</body>
</html>
